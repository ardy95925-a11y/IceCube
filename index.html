<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Codex — Study Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,300;1,7..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--surface:#161b25;--s2:#1c2333;--s3:#222c3e;
  --bd:#252f42;--bd2:#2d3a52;
  --blue:#3b7dd8;--blue-d:rgba(59,125,216,.15);--blue-b:rgba(59,125,216,.3);
  --t1:#e2e8f4;--t2:#8899b8;--t3:#4a5870;--t4:#28334a;
  --paper:#ffffff;--paper2:#fcfaf6;
  --ink:#0e1117;--ink2:#252c3a;--ink3:#545c72;--ink4:#a0a8bc;
  --rule:rgba(90,100,130,.10);--mline:rgba(170,30,30,.08);
  --green:#34b87a;--red:#e05555;--amber:#e8a832;--purple:#8b5cf6;
  --r:7px;--rsm:5px;
}
body.light{--bg:#eaecf2;--surface:#f2f4f9;--s2:#fff;--s3:#f8f9fc;--bd:#d0d8e8;--bd2:#c0c8da;--t1:#1a2035;--t2:#4a5878;--t3:#8898b8;--t4:#b0bcd0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Literata',Georgia,serif;-webkit-text-size-adjust:100%;touch-action:manipulation;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

/* ── LOADING ── */
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:3000;transition:opacity .4s,visibility .4s;}
#ld.out{opacity:0;visibility:hidden;pointer-events:none;}
.ld-w{font-family:'Instrument Serif',serif;font-size:2rem;letter-spacing:.18em;color:var(--t1);}
.ld-bar{width:100px;height:2px;background:var(--bd);border-radius:1px;overflow:hidden;}
.ld-fill{height:100%;background:var(--blue);animation:ldF 1.2s ease-in-out infinite;}
@keyframes ldF{0%{width:0;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0;margin-left:100%}}

/* ── AUTH ── */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 100% 80% at 50% 40%,#0a1428 0%,var(--bg) 100%);z-index:500;}
#auth.hidden{display:none;}
.auth-card{background:linear-gradient(145deg,#141e32,#0e1624);border:1px solid var(--bd);border-radius:18px;padding:56px 52px;width:min(400px,92vw);box-shadow:0 60px 120px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;gap:36px;}
.auth-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(145deg,#1c3060,#0f1e3c);border:1px solid rgba(59,125,216,.25);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(59,125,216,.2);}
.auth-title{font-family:'Instrument Serif',serif;font-size:2.1rem;letter-spacing:.08em;color:var(--t1);line-height:1;margin-bottom:-20px;}
.auth-sub{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:300;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;}
.auth-div{width:100%;height:1px;background:var(--bd);}
.g-btn{width:100%;padding:15px 20px;border-radius:10px;border:1px solid var(--bd2);background:rgba(255,255,255,.02);color:var(--t2);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .2s;min-height:52px;}
.g-btn:hover{background:var(--blue-d);border-color:var(--blue-b);color:var(--t1);}
.g-btn svg{width:18px;height:18px;flex-shrink:0;}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden;}
#app.hidden{display:none;}

/* ── SIDEBAR ── */
.sb{width:264px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-hd{padding:18px 14px 12px;border-bottom:1px solid var(--bd);}
.sb-brand{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sb-bi{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),#2a5cb8);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(59,125,216,.3);}
.sb-bn{font-family:'Instrument Serif',serif;font-size:1.1rem;letter-spacing:.08em;color:var(--t1);}
.sb-bn span{font-family:'JetBrains Mono',monospace;font-size:.5rem;font-weight:500;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-left:4px;vertical-align:super;}
.sb-srch{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rsm);padding:9px 11px;margin-bottom:9px;transition:border-color .15s;}
.sb-srch:focus-within{border-color:var(--blue-b);}
.sb-srch svg{color:var(--t3);flex-shrink:0;width:13px;height:13px;}
.sb-srch input{background:none;border:none;outline:none;width:100%;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:300;color:var(--t2);}
.sb-srch input::placeholder{color:var(--t4);}
.sb-new{width:100%;padding:10px;border-radius:var(--rsm);background:var(--blue-d);border:1px solid var(--blue-b);color:var(--blue);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;min-height:40px;}
.sb-new:hover{background:rgba(59,125,216,.22);border-color:rgba(59,125,216,.5);}
.sb-lbl{padding:12px 14px 4px;font-family:'JetBrains Mono',monospace;font-size:.57rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--t4);}
.nl{flex:1;overflow-y:auto;padding:2px 0 8px;}
.ni{padding:12px 14px;cursor:pointer;border-left:2.5px solid transparent;transition:background .12s,border-color .12s;position:relative;user-select:none;-webkit-tap-highlight-color:transparent;}
.ni:hover{background:rgba(255,255,255,.025);}
.ni.active{background:rgba(59,125,216,.08);border-left-color:var(--blue);}
.ni-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px;}
.ni-t{font-family:'Literata',serif;font-size:.85rem;font-weight:400;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.ni.active .ni-t{color:var(--t1);}
.ni-dt{font-family:'JetBrains Mono',monospace;font-size:.57rem;color:var(--t4);white-space:nowrap;flex-shrink:0;}
.ni-pv{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:300;color:var(--t4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.ni-tags{display:flex;gap:4px;}
.tc{padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.54rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.ni-del{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t4);cursor:pointer;padding:8px;opacity:0;transition:opacity .12s;font-size:.75rem;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.ni:hover .ni-del{opacity:.6;}
.ni-del:hover{opacity:1!important;color:var(--red);}
.sb-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:10px;text-align:center;}
.sb-empty .ei{font-size:2rem;opacity:.14;}
.sb-empty p{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:300;color:var(--t4);letter-spacing:.05em;line-height:1.9;}
.sb-ft{padding:11px 13px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:9px;}
.u-av{width:28px;height:28px;border-radius:7px;object-fit:cover;border:1px solid var(--bd);flex-shrink:0;}
.u-in{width:28px;height:28px;border-radius:7px;background:var(--blue-d);border:1px solid var(--blue-b);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:.95rem;color:var(--blue);flex-shrink:0;}
.u-nm{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:300;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sib{background:none;border:1px solid transparent;border-radius:var(--rsm);color:var(--t3);cursor:pointer;padding:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.sib:hover{background:var(--s2);border-color:var(--bd);color:var(--t1);}
.sib svg{width:14px;height:14px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOOLBAR ── */
.tb{height:50px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 8px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tb::-webkit-scrollbar{height:0;}
.tb-sep{width:1px;height:20px;background:var(--bd);margin:0 5px;flex-shrink:0;}
.tb-sp{flex:1;}
.tbb{min-height:38px;min-width:36px;padding:0 8px;background:none;border:1px solid transparent;border-radius:var(--rsm);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:500;-webkit-tap-highlight-color:transparent;user-select:none;}
.tbb:hover{background:rgba(255,255,255,.05);color:var(--t2);}
.tbb.on{background:var(--blue-d);border-color:var(--blue-b);color:var(--blue);}
.tbb:active{transform:scale(.95);}
.tbb svg{width:14px;height:14px;flex-shrink:0;pointer-events:none;}
.tbb span{pointer-events:none;}
/* Mode toggle */
.mt{display:flex;background:rgba(0,0,0,.2);border:1px solid var(--bd);border-radius:var(--rsm);overflow:hidden;flex-shrink:0;}
.mb{padding:7px 13px;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);transition:all .18s;min-height:36px;min-width:50px;-webkit-tap-highlight-color:transparent;}
.mb.on{background:var(--blue-d);color:var(--blue);}
/* Range slider */
.psz{-webkit-appearance:none;appearance:none;width:54px;height:3px;border-radius:2px;background:var(--bd);outline:none;cursor:pointer;flex-shrink:0;border:none;}
.psz::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 6px rgba(59,125,216,.5);}
/* Color dots */
.cd{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.1);cursor:pointer;flex-shrink:0;transition:transform .13s,border-color .13s;-webkit-tap-highlight-color:transparent;}
.cd:hover{transform:scale(1.16);}
.cd.on{border-color:rgba(255,255,255,.55);box-shadow:0 0 8px rgba(255,255,255,.18);}
/* Paper select */
.psel{background:rgba(0,0,0,.2);border:1px solid var(--bd);border-radius:var(--rsm);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:6px 8px;outline:none;cursor:pointer;flex-shrink:0;min-height:36px;}
.psel option{background:var(--surface);}
/* Save pill */
.sp{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .3s;flex-shrink:0;}
.sp.show{opacity:1;}.sp.saving{color:var(--t3);}.sp.saved{color:var(--green);}
.sp-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sp.saving .sp-dot{animation:spP .8s infinite;}
@keyframes spP{0%,100%{opacity:.3}50%{opacity:1}}
/* Back btn mobile */
.back-btn{display:none;background:none;border:none;color:var(--t2);cursor:pointer;padding:8px;font-size:1.2rem;min-width:44px;min-height:44px;align-items:center;justify-content:center;}

/* ── BOOK ── */
.book-scene{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;perspective:3600px;perspective-origin:50% 48%;background:radial-gradient(ellipse 90% 80% at 50% 65%,#0a1320 0%,var(--bg) 100%);padding:28px 20px;position:relative;}
.book-scene::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(1.5px 1.5px at 12% 20%,rgba(59,125,216,.15) 0%,transparent 100%),radial-gradient(1px 1px at 88% 18%,rgba(255,255,255,.05) 0%,transparent 100%);}
.bw{position:relative;width:min(640px,100%);height:min(860px,calc(100dvh - 110px));transform-style:preserve-3d;}
.bw::after{content:'';position:absolute;bottom:-20px;left:6%;right:6%;height:36px;background:radial-gradient(ellipse,rgba(0,0,0,.45) 0%,transparent 70%);filter:blur(9px);pointer-events:none;}
.pstack{position:absolute;inset:0;pointer-events:none;z-index:0;}
.psl{position:absolute;inset:0;background:var(--paper2);border-radius:1px 3px 3px 1px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.psl:nth-child(1){transform:translate(2px,1px) rotateY(.25deg);}
.psl:nth-child(2){transform:translate(4px,2px) rotateY(.5deg);}
.psl:nth-child(3){transform:translate(6px,3px) rotateY(.75deg);}
/* Flip */
.fc{position:absolute;inset:0;z-index:2;transform-style:preserve-3d;transform-origin:left center;will-change:transform;}
.ff,.fb{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.fb{transform:rotateY(180deg);}
/* Paper */
.pp{width:100%;height:100%;background:var(--paper);border-radius:1px 4px 4px 1px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,.1),10px 0 40px rgba(0,0,0,.07);}
.fb .pp{box-shadow:-2px 0 8px rgba(0,0,0,.14),-10px 0 40px rgba(0,0,0,.09);}
.pg-gut{position:absolute;left:0;top:0;bottom:0;width:50px;background:linear-gradient(to right,rgba(0,0,0,.04) 0%,rgba(0,0,0,.01) 60%,transparent 100%);pointer-events:none;z-index:3;}
/* Paper rules */
.p-lined .pg-ca::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 31px,var(--rule) 31px,var(--rule) 32px);background-position:0 74px;}
.p-lined .pg-ca::after{content:'';position:absolute;left:50px;top:0;bottom:0;width:1px;background:var(--mline);pointer-events:none;}
.p-grid .pg-ca::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--rule) 1px,transparent 1px),linear-gradient(90deg,var(--rule) 1px,transparent 1px);background-size:24px 24px;}
.p-dotted .pg-ca::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(90,100,130,.22) 1px,transparent 1px);background-size:24px 24px;background-position:12px 12px;}
/* Page header */
.pg-hd{padding:16px 22px 0 58px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:4;}
.pg-subj{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);}
.pg-dt{font-family:'JetBrains Mono',monospace;font-size:.57rem;font-weight:300;color:var(--ink4);}
.pg-hr{height:1px;background:linear-gradient(to right,transparent,var(--rule) 15%,var(--rule) 85%,transparent);margin:8px 22px 0 58px;flex-shrink:0;}
/* Content */
.pg-ca{flex:1;position:relative;overflow:hidden;}
.pg-sc{position:absolute;inset:0;overflow-y:auto;padding:15px 30px 24px 62px;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}
.pg-sc::-webkit-scrollbar{width:3px;}.pg-sc::-webkit-scrollbar-thumb{background:rgba(0,0,0,.07);}
/* Title */
#note-title{font-family:'Instrument Serif',serif;font-size:clamp(1.5rem,3.2vw,2.1rem);font-weight:400;line-height:1.25;color:var(--ink);background:none;border:none;outline:none;width:100%;resize:none;overflow:hidden;padding:0;margin-bottom:12px;min-height:1.25em;-webkit-tap-highlight-color:transparent;}
#note-title::placeholder{color:var(--ink4);opacity:.4;}
#note-title:disabled{color:var(--ink);}
/* Body */
#note-body{font-family:'Literata',serif;font-size:1.0rem;font-weight:300;line-height:2.0;color:var(--ink2);outline:none;min-height:160px;flex:1;word-break:break-word;caret-color:var(--blue);-webkit-tap-highlight-color:transparent;}
#note-body:empty::before{content:attr(data-ph);color:var(--ink4);opacity:.38;font-style:italic;pointer-events:none;}
#note-body h1{font-family:'Instrument Serif',serif;font-size:1.55rem;font-weight:400;line-height:1.3;margin:18px 0 9px;color:var(--ink);border-bottom:1px solid var(--rule);padding-bottom:6px;}
#note-body h2{font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400;line-height:1.35;margin:15px 0 7px;color:var(--ink);}
#note-body h3{font-family:'Literata',serif;font-size:1.04rem;font-weight:500;line-height:1.4;margin:12px 0 5px;color:var(--ink);}
#note-body strong{font-weight:600;color:var(--ink);}
#note-body em{font-style:italic;}
#note-body u{text-decoration:underline;text-decoration-color:rgba(59,125,216,.45);text-underline-offset:3px;}
#note-body s{text-decoration:line-through;opacity:.6;}
#note-body ul,#note-body ol{margin:6px 0 6px 18px;}
#note-body li{margin-bottom:3px;line-height:1.75;}
#note-body blockquote{margin:10px 0;padding:9px 14px;border-left:3px solid var(--blue);background:rgba(59,125,216,.04);border-radius:0 4px 4px 0;font-style:italic;color:var(--ink3);}
#note-body code{font-family:'JetBrains Mono',monospace;font-size:.82em;background:rgba(0,0,0,.055);border:1px solid rgba(0,0,0,.07);border-radius:3px;padding:1px 5px;color:var(--ink);}
#note-body pre{font-family:'JetBrains Mono',monospace;font-size:.8rem;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.07);border-radius:6px;padding:12px 14px;margin:8px 0;white-space:pre-wrap;line-height:1.7;}
#note-body hr{border:none;border-top:1px solid var(--rule);margin:14px 0;}
#note-body mark{background:rgba(255,210,60,.35);border-radius:2px;padding:0 2px;}
/* Page footer */
.pg-ft{padding:7px 20px 10px 58px;flex-shrink:0;border-top:1px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:4;}
.pg-wc{font-family:'JetBrains Mono',monospace;font-size:.57rem;font-weight:300;color:var(--ink4);}
.pg-nm{font-family:'JetBrains Mono',monospace;font-size:.57rem;font-weight:300;color:var(--ink4);}
/* Canvas */
#draw-canvas{position:absolute;inset:0;z-index:5;touch-action:none;display:none;}
#draw-canvas.on{display:block;}
/* Empty */
.pg-emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:48px;}
.pg-emp-m{font-family:'Instrument Serif',serif;font-size:3.5rem;color:var(--ink4);opacity:.16;line-height:1;}
.pg-emp p{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:300;color:var(--ink4);opacity:.35;letter-spacing:.08em;text-align:center;line-height:1.9;}
/* Flip shadow */
.fshadow{position:absolute;inset:0;pointer-events:none;z-index:10;background:linear-gradient(to left,rgba(0,0,0,0),rgba(0,0,0,.15) 50%,rgba(0,0,0,.04) 100%);opacity:0;border-radius:1px 4px 4px 1px;transition:opacity .14s;}
.clift{position:absolute;bottom:0;right:0;width:40px;height:40px;pointer-events:none;z-index:6;clip-path:polygon(100% 0,100% 100%,0 100%);background:linear-gradient(135deg,transparent 50%,rgba(0,0,0,.05) 50%);opacity:0;transition:opacity .2s;}
/* Flip anims */
@keyframes flipO{0%{transform:rotateY(0deg) scale(1);filter:drop-shadow(4px 0 12px rgba(0,0,0,.22));}50%{transform:rotateY(-50deg) scale(1.008);filter:drop-shadow(-8px 2px 20px rgba(0,0,0,.3));}100%{transform:rotateY(-93deg) scale(1);filter:none;}}
@keyframes flipI{0%{transform:rotateY(93deg) scale(1);filter:none;}50%{transform:rotateY(50deg) scale(1.008);filter:drop-shadow(-8px 2px 20px rgba(0,0,0,.28));}100%{transform:rotateY(0deg) scale(1);filter:drop-shadow(2px 0 8px rgba(0,0,0,.1));}}
.fc.ao{animation:flipO .30s cubic-bezier(.4,0,.8,1) forwards;transform-origin:left center;}
.fc.ai{animation:flipI .30s cubic-bezier(.2,0,.6,1) forwards;transform-origin:left center;}
.fc.ao .fshadow,.fc.ai .fshadow{opacity:1;}
.fc:not(.ao):not(.ai):hover .clift{opacity:1;}

/* ── MODALS ── */
.mo{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .2s;}
.mo.open{opacity:1;pointer-events:all;}
.mc{background:var(--surface);border:1px solid var(--bd);border-radius:16px;padding:0;width:min(480px,94vw);max-height:88dvh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 48px 100px rgba(0,0,0,.55);transform:translateY(10px) scale(.98);transition:transform .2s;}
.mo.open .mc{transform:translateY(0) scale(1);}
.mc-hd{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mc-title{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--t1);}
.mc-close{background:none;border:none;color:var(--t3);cursor:pointer;padding:6px;border-radius:var(--rsm);font-size:1.1rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.mc-close:hover{background:var(--s2);color:var(--t1);}
.mc-body{overflow-y:auto;padding:16px 20px 20px;display:flex;flex-direction:column;gap:18px;}
/* Settings rows */
.sg{display:flex;flex-direction:column;gap:9px;}
.sgl{font-family:'JetBrains Mono',monospace;font-size:.59rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);padding-bottom:4px;border-bottom:1px solid var(--bd);}
.sr{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:2px 0;}
.sr-l{font-family:'JetBrains Mono',monospace;font-size:.71rem;font-weight:300;letter-spacing:.03em;color:var(--t2);}
.sr-d{font-family:'JetBrains Mono',monospace;font-size:.59rem;font-weight:300;color:var(--t3);margin-top:2px;}
/* Toggle */
.tog{position:relative;width:44px;height:24px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-tr{position:absolute;inset:0;background:var(--bd2);border-radius:12px;cursor:pointer;transition:background .18s;}
.tog input:checked+.tog-tr{background:var(--blue);}
.tog-th{position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .18s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.tog input:checked~.tog-th{transform:translateX(20px);}
/* Seg control */
.seg{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rsm);overflow:hidden;}
.sb2{padding:7px 12px;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:400;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);transition:all .17s;min-height:34px;min-width:40px;}
.sb2.on{background:var(--s2);color:var(--t1);}
/* Beta */
.beta-badge{display:inline-flex;padding:2px 7px;background:linear-gradient(135deg,#3d1f7a,#251450);border:1px solid rgba(139,92,246,.3);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.54rem;font-weight:500;letter-spacing:.1em;color:#b090f0;text-transform:uppercase;margin-left:7px;}
.beta-box{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.14);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.beta-box .sgl{color:#9070d0;border-color:rgba(139,92,246,.2);}
/* Tag grid */
.tg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.tg-o{height:44px;border-radius:var(--rsm);border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:.64rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;transition:all .14s;-webkit-tap-highlight-color:transparent;}
.tg-o.on{border-color:currentColor;opacity:1;}
.tg-o:not(.on){opacity:.48;}
.tg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── MATH KEYBOARD ── */
#mkb{position:fixed;bottom:0;left:0;right:0;z-index:600;background:var(--surface);border-top:1px solid var(--bd);box-shadow:0 -20px 60px rgba(0,0,0,.4);transform:translateY(100%);transition:transform .28s cubic-bezier(.2,0,.4,1);padding-bottom:env(safe-area-inset-bottom,0);}
#mkb.open{transform:translateY(0);}
.mkb-top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid var(--bd);}
.mkb-tabs{display:flex;gap:2px;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;}
.mkb-tabs::-webkit-scrollbar{height:0;}
.mkt{padding:6px 12px;background:none;border:1px solid transparent;border-radius:var(--rsm);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);transition:all .14s;min-height:32px;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.mkt.on{background:var(--blue-d);border-color:var(--blue-b);color:var(--blue);}
.mkb-close-btn{background:none;border:1px solid var(--bd);border-radius:var(--rsm);color:var(--t3);cursor:pointer;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;transition:all .14s;min-height:32px;white-space:nowrap;flex-shrink:0;margin-left:8px;}
.mkb-close-btn:hover{color:var(--t1);border-color:var(--bd2);}
/* Action row — always visible */
.mkb-actions{display:flex;align-items:center;gap:5px;padding:7px 12px 5px;border-bottom:1px solid rgba(255,255,255,.04);}
.mka{flex:1;height:42px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rsm);cursor:pointer;color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:400;transition:all .14s;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 0 var(--bd);}
.mka:hover{background:var(--blue-d);border-color:var(--blue-b);color:var(--blue);}
.mka:active{transform:translateY(1px);box-shadow:none;}
.mka.del{flex:0 0 56px;background:rgba(224,85,85,.1);border-color:rgba(224,85,85,.25);color:var(--red);}
.mka.del:hover{background:rgba(224,85,85,.2);}
/* Symbol grid */
.mkb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:4px;padding:7px 12px 10px;max-height:190px;overflow-y:auto;}
.mkb-grid::-webkit-scrollbar{width:3px;}
.mk{height:46px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rsm);cursor:pointer;color:var(--t1);font-size:1.1rem;transition:all .13s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;-webkit-tap-highlight-color:transparent;user-select:none;box-shadow:0 2px 0 var(--bd);}
.mk:hover{background:var(--blue-d);border-color:var(--blue-b);}
.mk:active{transform:translateY(1px);box-shadow:none;}
.mk.w{font-size:.64rem;font-family:'JetBrains Mono',monospace;letter-spacing:.02em;color:var(--t2);}
.mk-lbl{font-family:'JetBrains Mono',monospace;font-size:.46rem;font-weight:300;color:var(--t4);letter-spacing:.04em;line-height:1;}

/* ── FOCUS MODE (BETA) ── */
#focus-mode{position:fixed;inset:0;z-index:700;background:var(--paper);display:none;flex-direction:column;align-items:center;}
#focus-mode.open{display:flex;}
.fm-bar{width:100%;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;}
.fm-timer{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:300;color:var(--ink3);letter-spacing:.1em;}
.fm-timer.running{color:var(--ink);}
.fm-controls{display:flex;gap:8px;align-items:center;}
.fm-btn{padding:7px 14px;background:none;border:1px solid var(--rule);border-radius:var(--rsm);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);transition:all .15s;min-height:36px;}
.fm-btn:hover{border-color:rgba(59,125,216,.3);color:var(--blue);}
.fm-btn.primary{background:var(--blue);border-color:var(--blue);color:white;}
.fm-btn.primary:hover{background:#2a6cc8;}
.fm-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:1.1rem;padding:6px;border-radius:var(--rsm);transition:color .14s;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.fm-close:hover{color:var(--red);}
.fm-doc{flex:1;width:100%;max-width:660px;overflow-y:auto;padding:32px 40px;display:flex;flex-direction:column;}
.fm-progress{height:2px;background:rgba(0,0,0,.06);flex-shrink:0;}
.fm-prog-fill{height:100%;background:var(--blue);transition:width 1s linear;}
.pomo-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);opacity:.7;}

/* ── AI ASSISTANT (BETA) ── */
#ai-panel{position:fixed;right:0;top:0;bottom:0;width:min(380px,90vw);z-index:650;background:var(--surface);border-left:1px solid var(--bd);box-shadow:-20px 0 60px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .28s cubic-bezier(.2,0,.4,1);display:flex;flex-direction:column;}
#ai-panel.open{transform:translateX(0);}
.aip-hd{padding:16px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.aip-title{font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--t1);display:flex;align-items:center;gap:8px;}
.aip-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.aip-msg{padding:10px 13px;border-radius:10px;font-family:'Literata',serif;font-size:.88rem;line-height:1.65;font-weight:300;}
.aip-msg.user{background:var(--blue-d);border:1px solid var(--blue-b);color:var(--t1);align-self:flex-end;max-width:90%;}
.aip-msg.ai{background:var(--s2);border:1px solid var(--bd);color:var(--t2);align-self:flex-start;max-width:95%;}
.aip-msg.loading{opacity:.5;}
.aip-ft{padding:12px 14px;border-top:1px solid var(--bd);flex-shrink:0;}
.aip-input-row{display:flex;gap:7px;}
.aip-inp{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rsm);padding:9px 12px;color:var(--t1);font-family:'Literata',serif;font-size:.88rem;outline:none;resize:none;min-height:40px;max-height:100px;transition:border-color .15s;}
.aip-inp:focus{border-color:var(--blue-b);}
.aip-send{width:40px;height:40px;background:var(--blue);border:none;border-radius:var(--rsm);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.aip-send:hover{background:#2a6cc8;}
.aip-send svg{width:16px;height:16px;}
.aip-hint{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:300;color:var(--t4);margin-top:7px;letter-spacing:.04em;}

/* ── FLASHCARDS (BETA) ── */
#flash-modal .mc{width:min(520px,94vw);}
.flash-card-wrap{perspective:900px;height:200px;cursor:pointer;flex-shrink:0;}
.flash-card{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);border-radius:var(--r);position:relative;}
.flash-card.flipped{transform:rotateY(180deg);}
.flash-face{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;}
.flash-face.front{background:var(--s2);border:1px solid var(--bd);}
.flash-face.back{background:var(--blue-d);border:1px solid var(--blue-b);transform:rotateY(180deg);}
.flash-face-text{font-family:'Literata',serif;font-size:1.05rem;font-weight:400;line-height:1.6;color:var(--t1);}
.flash-controls{display:flex;gap:8px;justify-content:center;margin-top:14px;}
.flash-prog{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:300;color:var(--t3);text-align:center;margin-bottom:12px;}
.flash-hint{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:300;color:var(--t4);text-align:center;margin-top:8px;letter-spacing:.05em;}

/* ── OUTLINE PANEL (BETA) ── */
#outline-panel{position:fixed;left:264px;top:50px;bottom:0;width:220px;z-index:300;background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.2);}
#outline-panel.open{transform:translateX(0);}
.op-hd{padding:14px 16px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.op-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);}
.op-close{background:none;border:none;color:var(--t4);cursor:pointer;font-size:1rem;padding:4px;border-radius:var(--rsm);transition:color .14s;}
.op-close:hover{color:var(--red);}
.op-list{flex:1;overflow-y:auto;padding:8px 0;}
.op-item{padding:8px 16px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.67rem;font-weight:300;letter-spacing:.03em;color:var(--t3);transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.op-item:hover{background:rgba(255,255,255,.03);color:var(--t1);}
.op-item.h1{color:var(--t2);font-weight:500;}
.op-item.h2{padding-left:28px;font-size:.63rem;}
.op-item.h3{padding-left:40px;font-size:.6rem;opacity:.7;}
.op-empty{padding:24px 16px;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:300;color:var(--t4);text-align:center;line-height:1.8;}

/* ── STATS MODAL (BETA) ── */
#stats-modal .mc{width:min(440px,94vw);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--blue);line-height:1;}
.stat-l{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-top:4px;}
.words-chart{margin-top:14px;}
.top-words{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tw{padding:3px 9px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:300;color:var(--t2);}

/* ── HUD ── */
#shud{position:fixed;top:66
