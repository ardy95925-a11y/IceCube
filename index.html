<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Focus"/>
  <meta name="theme-color" content="#100f0a"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%23100f0a'/><circle cx='90' cy='90' r='56' fill='none' stroke='%23f97316' stroke-width='9'/><text x='90' y='108' text-anchor='middle' font-size='48' fill='%23f97316'>🍅</text></svg>"/>
  <title>Focus — Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #100f0a;
      --bg2:       #1a1812;
      --surface:   #201e17;
      --border:    #2e2b1f;
      --amber:     #f97316;
      --amber2:    #fb923c;
      --amber-dim: #7c3900;
      --green:     #4ade80;
      --blue:      #60a5fa;
      --text:      #f0ead6;
      --text-dim:  #7a7460;
      --radius:    16px;
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    html,body{
      width:100%;height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'DM Mono',monospace;
      overflow:hidden;
      touch-action:manipulation;
    }

    /* Grain overlay */
    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none;z-index:9999;opacity:.5;
    }

    /* ─── Layout ─── */
    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 24px);
    }

    /* ─── Top bar ─── */
    .topbar{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 28px 0;
    }

    .logo{
      font-family:'Bebas Neue',sans-serif;
      font-size:22px;
      letter-spacing:0.18em;
      color:var(--amber);
    }

    .session-pills{
      display:flex;gap:6px;
    }

    .pill{
      width:10px;height:10px;
      border-radius:50%;
      background:var(--border);
      transition:background .3s, box-shadow .3s;
    }
    .pill.done{ background:var(--amber); box-shadow:0 0 8px var(--amber); }

    .settings-btn{
      background:none;border:none;
      color:var(--text-dim);font-size:20px;
      cursor:pointer;padding:4px;
      transition:color .2s;
    }
    .settings-btn:active{color:var(--amber);}

    /* ─── Mode tabs ─── */
    .mode-tabs{
      display:flex;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:40px;
      padding:4px;
      gap:2px;
    }

    .tab{
      font-family:'DM Mono',monospace;
      font-size:11px;
      letter-spacing:0.1em;
      text-transform:uppercase;
      padding:8px 18px;
      border-radius:40px;
      border:none;
      background:none;
      color:var(--text-dim);
      cursor:pointer;
      transition:all .25s;
    }
    .tab.active{
      background:var(--amber);
      color:#0a0800;
      font-weight:500;
    }

    /* ─── Timer ring ─── */
    .ring-wrap{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ring-svg{
      transform:rotate(-90deg);
      filter: drop-shadow(0 0 20px rgba(249,115,22,0.25));
    }

    .ring-track{ fill:none; stroke:var(--surface); }
    .ring-fill{
      fill:none;
      stroke:var(--amber);
      stroke-linecap:round;
      transition: stroke-dashoffset 1s linear, stroke .5s;
    }

    .ring-center{
      position:absolute;
      text-align:center;
      pointer-events:none;
    }

    .time-display{
      font-family:'Bebas Neue',sans-serif;
      font-size: clamp(72px, 14vw, 110px);
      line-height:1;
      letter-spacing:0.05em;
      color:var(--text);
    }

    .phase-label{
      font-size:11px;
      letter-spacing:0.25em;
      text-transform:uppercase;
      color:var(--text-dim);
      margin-top:6px;
    }

    /* ─── Controls ─── */
    .controls{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .ctrl-btn{
      border:none;cursor:pointer;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s, opacity .15s;
    }
    .ctrl-btn:active{transform:scale(0.92);}

    .btn-secondary{
      width:54px;height:54px;
      background:var(--surface);
      border:1px solid var(--border);
      font-size:20px;
      color:var(--text-dim);
    }
    .btn-secondary:active{color:var(--text); border-color:var(--amber-dim);}

    .btn-primary{
      width:80px;height:80px;
      background:var(--amber);
      font-size:28px;
      box-shadow: 0 0 30px rgba(249,115,22,0.35), 0 4px 12px rgba(0,0,0,0.5);
    }
    .btn-primary:active{box-shadow:0 0 12px rgba(249,115,22,0.2);}
    .btn-primary.running{
      background: #1a1812;
      border:2px solid var(--amber);
      box-shadow: 0 0 30px rgba(249,115,22,0.2);
    }

    /* ─── Stats bar ─── */
    .stats{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      padding:0 24px;
    }

    .stat-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px 10px;
      text-align:center;
    }

    .stat-val{
      font-family:'Bebas Neue',sans-serif;
      font-size:28px;
      letter-spacing:0.05em;
      color:var(--amber);
    }

    .stat-lbl{
      font-size:9px;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--text-dim);
      margin-top:2px;
    }

    /* ─── Notification banner ─── */
    .notif-banner{
      position:fixed;
      top:0;left:0;right:0;
      background:var(--amber);
      color:#0a0800;
      font-family:'Bebas Neue',sans-serif;
      font-size:18px;
      letter-spacing:0.12em;
      text-align:center;
      padding:14px 20px;
      transform:translateY(-100%);
      transition:transform .4s cubic-bezier(0.34,1.56,0.64,1);
      z-index:1000;
    }
    .notif-banner.show{transform:translateY(0);}

    /* ─── Settings panel ─── */
    .settings-overlay{
      position:fixed;inset:0;
      background:rgba(10,8,4,0.85);
      backdrop-filter:blur(12px);
      z-index:500;
      display:flex;
      align-items:flex-end;
      opacity:0;
      pointer-events:none;
      transition:opacity .3s;
    }
    .settings-overlay.open{opacity:1;pointer-events:all;}

    .settings-sheet{
      width:100%;
      background:var(--bg2);
      border-top:1px solid var(--border);
      border-radius:24px 24px 0 0;
      padding:24px 28px 48px;
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(0.34,1.3,0.64,1);
    }
    .settings-overlay.open .settings-sheet{transform:translateY(0);}

    .sheet-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:24px;
      letter-spacing:0.12em;
      color:var(--amber);
      margin-bottom:24px;
    }

    .setting-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      border-bottom:1px solid var(--border);
    }

    .setting-name{
      font-size:12px;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--text-dim);
    }

    .setting-stepper{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .step-btn{
      width:34px;height:34px;
      border-radius:50%;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      font-size:18px;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .15s;
    }
    .step-btn:active{background:var(--amber);color:#0a0800;border-color:var(--amber);}

    .step-val{
      font-family:'Bebas Neue',sans-serif;
      font-size:24px;
      color:var(--text);
      min-width:32px;
      text-align:center;
    }

    .close-sheet{
      width:100%;margin-top:24px;
      background:var(--amber);
      border:none;border-radius:12px;
      color:#0a0800;
      font-family:'Bebas Neue',sans-serif;
      font-size:20px;
      letter-spacing:0.12em;
      padding:16px;
      cursor:pointer;
    }

    /* ─── Install prompt ─── */
    .install-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);
      border-top:1px solid var(--border);
      padding:16px 24px env(safe-area-inset-bottom, 16px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      transform:translateY(100%);
      transition:transform .4s cubic-bezier(0.34,1.2,0.64,1);
      z-index:200;
    }
    .install-bar.show{transform:translateY(0);}

    .install-text{
      font-size:12px;
      color:var(--text-dim);
      line-height:1.5;
      flex:1;
    }
    .install-text strong{color:var(--text);display:block;}

    .install-ok{
      background:var(--amber);
      border:none;border-radius:10px;
      color:#0a0800;
      font-family:'Bebas Neue',sans-serif;
      font-size:16px;
      letter-spacing:0.08em;
      padding:10px 20px;
      cursor:pointer;white-space:nowrap;
    }
    .install-dismiss{
      background:none;border:none;
      color:var(--text-dim);font-size:20px;cursor:pointer;
    }

    /* ─── Pulse on tick ─── */
    @keyframes tick-pulse{
      0%{opacity:1}50%{opacity:.6}100%{opacity:1}
    }
    .ticking .time-display{animation:tick-pulse 1s infinite;}
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">🍅 FOCUS</div>
    <div class="session-pills" id="pills"></div>
    <button class="settings-btn" id="settingsBtn" aria-label="Settings">⚙</button>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="tab active" data-mode="work">Work</button>
    <button class="tab" data-mode="short">Short Break</button>
    <button class="tab" data-mode="long">Long Break</button>
  </div>

  <!-- Ring timer -->
  <div class="ring-wrap" id="ringWrap">
    <svg class="ring-svg" id="ringSvg" viewBox="0 0 300 300">
      <circle class="ring-track" id="ringTrack" cx="150" cy="150" r="130" stroke-width="12"/>
      <circle class="ring-fill"  id="ringFill"  cx="150" cy="150" r="130" stroke-width="12"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="phase-label"  id="phaseLabel">Focus time</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn btn-secondary" id="resetBtn" aria-label="Reset">↺</button>
    <button class="ctrl-btn btn-primary"   id="startBtn" aria-label="Start">▶</button>
    <button class="ctrl-btn btn-secondary" id="skipBtn"  aria-label="Skip">⏭</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statSessions">0</div>
      <div class="stat-lbl">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statFocus">0</div>
      <div class="stat-lbl">Min focused</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-lbl">Streak</div>
    </div>
  </div>

</div>

<!-- Notification banner (fallback) -->
<div class="notif-banner" id="notifBanner"></div>

<!-- Settings sheet -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-sheet">
    <div class="sheet-title">⚙ Settings</div>
    <div class="setting-row">
      <span class="setting-name">Work (min)</span>
      <div class="setting-stepper">
        <button class="step-btn" data-cfg="work" data-dir="-1">−</button>
        <span class="step-val" id="cfg-work">25</span>
        <button class="step-btn" data-cfg="work" data-dir="1">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-name">Short Break (min)</span>
      <div class="setting-stepper">
        <button class="step-btn" data-cfg="short" data-dir="-1">−</button>
        <span class="step-val" id="cfg-short">5</span>
        <button class="step-btn" data-cfg="short" data-dir="1">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-name">Long Break (min)</span>
      <div class="setting-stepper">
        <button class="step-btn" data-cfg="long" data-dir="-1">−</button>
        <span class="step-val" id="cfg-long">15</span>
        <button class="step-btn" data-cfg="long" data-dir="1">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-name">Sessions before long break</span>
      <div class="setting-stepper">
        <button class="step-btn" data-cfg="cycles" data-dir="-1">−</button>
        <span class="step-val" id="cfg-cycles">4</span>
        <button class="step-btn" data-cfg="cycles" data-dir="1">+</button>
      </div>
    </div>
    <button class="close-sheet" id="closeSheet">Done</button>
  </div>
</div>

<!-- Install prompt (shown if not installed as PWA) -->
<div class="install-bar" id="installBar">
  <div class="install-text">
    <strong>Add to Home Screen</strong>
    Tap Share → "Add to Home Screen" for background notifications
  </div>
  <button class="install-ok" id="installOk">Got it</button>
  <button class="install-dismiss" id="installDismiss">✕</button>
</div>

<script>
// ─── Config ───────────────────────────────────────────────
let cfg = JSON.parse(localStorage.getItem('pomo_cfg') || 'null') || {
  work: 25, short: 5, long: 15, cycles: 4
};

const MODES = {
  work:  { label:'Focus time',   color:'#f97316', key:'work'  },
  short: { label:'Short break',  color:'#4ade80', key:'short' },
  long:  { label:'Long break',   color:'#60a5fa', key:'long'  }
};

// ─── State ────────────────────────────────────────────────
let mode       = 'work';
let totalSecs  = cfg.work * 60;
let remaining  = totalSecs;
let running    = false;
let interval   = null;
let endTime    = null;   // wall-clock ms when timer hits zero
let sessions   = parseInt(localStorage.getItem('pomo_sessions') || '0');
let focusMins  = parseInt(localStorage.getItem('pomo_focus')    || '0');
let streak     = parseInt(localStorage.getItem('pomo_streak')   || '0');
let lastDate   = localStorage.getItem('pomo_date') || '';

// Restore if page refreshed while running
(function restoreState() {
  try {
    const saved = localStorage.getItem('pomo_running');
    if (saved) {
      const s = JSON.parse(saved);
      const now = Date.now();
      if (s.endTime > now) {
        mode      = s.mode;
        totalSecs = s.total;
        endTime   = s.endTime;
        remaining = Math.ceil((endTime - now) / 1000);
        running   = true;
      } else {
        localStorage.removeItem('pomo_running');
      }
    }
  } catch(e) {}
})();

checkStreakReset();

// ─── DOM refs ─────────────────────────────────────────────
const timeDisplay = document.getElementById('timeDisplay');
const phaseLabel  = document.getElementById('phaseLabel');
const startBtn    = document.getElementById('startBtn');
const resetBtn    = document.getElementById('resetBtn');
const skipBtn     = document.getElementById('skipBtn');
const ringFill    = document.getElementById('ringFill');
const ringSvg     = document.getElementById('ringSvg');
const ringWrap    = document.getElementById('ringWrap');
const notifBanner = document.getElementById('notifBanner');

// ─── Ring setup ───────────────────────────────────────────
const R = 130;
const CIRC = 2 * Math.PI * R;
ringFill.style.strokeDasharray = CIRC;
ringFill.style.strokeDashoffset = 0;

function setRingSvgSize() {
  const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.38, 320);
  ringSvg.setAttribute('width', size);
  ringSvg.setAttribute('height', size);
}
setRingSvgSize();
window.addEventListener('resize', setRingSvgSize);

function updateRing() {
  const progress = remaining / totalSecs;
  const offset   = CIRC * (1 - progress);
  ringFill.style.strokeDashoffset = offset;
  ringFill.style.stroke = MODES[mode].color;
}

// ─── Display ──────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function render() {
  timeDisplay.textContent = formatTime(remaining);
  phaseLabel.textContent  = MODES[mode].label;
  document.title          = `${formatTime(remaining)} — ${MODES[mode].label}`;
  startBtn.textContent    = running ? '⏸' : '▶';
  startBtn.classList.toggle('running', running);
  ringWrap.classList.toggle('ticking', running);
  updateRing();
  renderPills();
  document.getElementById('statSessions').textContent = sessions;
  document.getElementById('statFocus').textContent    = focusMins;
  document.getElementById('statStreak').textContent   = streak;
}

function renderPills() {
  const pills = document.getElementById('pills');
  pills.innerHTML = '';
  for (let i = 0; i < cfg.cycles; i++) {
    const p = document.createElement('div');
    p.className = 'pill' + (i < sessions % cfg.cycles ? ' done' : '');
    pills.appendChild(p);
  }
}

// ─── Timer logic ──────────────────────────────────────────
function startStop() {
  if (running) {
    // Pause: save remaining, cancel scheduled notif
    clearInterval(interval); interval = null;
    remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    running = false;
    endTime = null;
    localStorage.removeItem('pomo_running');
    swMessage({ type: 'CANCEL' });
  } else {
    requestNotifPermission();
    running = true;
    endTime = Date.now() + remaining * 1000;
    // Persist so page-refresh recovers the timer
    localStorage.setItem('pomo_running', JSON.stringify({ endTime, mode, total: totalSecs }));
    // Pre-schedule SW notification for when timer ends
    scheduleNotif();
    interval = setInterval(tick, 500); // 500ms for snappy UI
  }
  render();
}

function tick() {
  if (!endTime) return;
  const now = Date.now();
  remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
  render();
  if (remaining <= 0) finish();
}

function finish() {
  clearInterval(interval); interval = null;
  running = false;
  endTime = null;
  localStorage.removeItem('pomo_running');

  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
  playChime();

  if (mode === 'work') {
    sessions++;
    focusMins += cfg.work;
    updateStreak();
    localStorage.setItem('pomo_sessions', sessions);
    localStorage.setItem('pomo_focus',    focusMins);
    localStorage.setItem('pomo_streak',   streak);
    showBanner('🍅 Session complete! Take a break.');
    const nextMode = (sessions % cfg.cycles === 0) ? 'long' : 'short';
    switchMode(nextMode);
    // Notification already fired by SW; send immediate one as fallback
    swMessage({ type: 'NOTIFY', title: '🍅 Session complete!', body: 'Time for a well-deserved break.' });
  } else {
    showBanner('⚡ Break over! Back to work.');
    switchMode('work');
    swMessage({ type: 'NOTIFY', title: '⚡ Break over!', body: 'Ready to focus again?' });
  }
  render();
}

function reset() {
  clearInterval(interval); interval = null;
  running = false; endTime = null;
  remaining = totalSecs;
  localStorage.removeItem('pomo_running');
  swMessage({ type: 'CANCEL' });
  render();
}

function skip() {
  clearInterval(interval); interval = null;
  running = false;
  localStorage.removeItem('pomo_running');
  swMessage({ type: 'CANCEL' });
  finish();
}

// Send a message to the active service worker
async function swMessage(msg) {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    reg.active?.postMessage(msg);
  } catch(e) {}
}

// Tell the SW to fire a notification exactly when the timer ends
async function scheduleNotif() {
  const delayMs = endTime - Date.now();
  const isWork  = mode === 'work';
  swMessage({
    type:    'SCHEDULE',
    title:   isWork ? '🍅 Session complete!' : '⚡ Break over!',
    body:    isWork ? 'Time for a well-deserved break.' : 'Ready to focus again?',
    delayMs: Math.max(0, delayMs)
  });
}

// Re-sync when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running && endTime) {
    const now = Date.now();
    remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
    if (remaining <= 0) {
      finish();
    } else {
      render();
    }
  }
});

function switchMode(m) {
  mode      = m;
  totalSecs = cfg[MODES[m].key] * 60;
  remaining = totalSecs;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
}

// ─── Audio chime (Web Audio) ──────────────────────────────
function playChime() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch(e) {}
}

// ─── Notifications ────────────────────────────────────────
async function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}



function showBanner(msg) {
  notifBanner.textContent = msg;
  notifBanner.classList.add('show');
  setTimeout(() => notifBanner.classList.remove('show'), 3500);
}

// ─── Streak ───────────────────────────────────────────────
function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDate === today) {
    // same day, streak continues
  } else if (lastDate === yesterday) {
    streak++;
  } else if (lastDate === '') {
    streak = 1;
  } else {
    streak = 1; // reset
  }
  lastDate = today;
  localStorage.setItem('pomo_date', lastDate);
}

function checkStreakReset() {
  const today     = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDate && lastDate !== today && lastDate !== yesterday) {
    streak = 0;
    localStorage.setItem('pomo_streak', 0);
  }
}

// ─── Settings ─────────────────────────────────────────────
const overlay = document.getElementById('settingsOverlay');
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('closeSheet').addEventListener('click', closeSettings);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

function openSettings() {
  ['work','short','long','cycles'].forEach(k => {
    document.getElementById('cfg-'+k).textContent = cfg[k];
  });
  overlay.classList.add('open');
}

function closeSettings() {
  overlay.classList.remove('open');
  localStorage.setItem('pomo_cfg', JSON.stringify(cfg));
  // Reset current mode duration
  totalSecs = cfg[MODES[mode].key] * 60;
  if (!running) remaining = totalSecs;
  render();
}

document.querySelectorAll('.step-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const k   = btn.dataset.cfg;
    const dir = parseInt(btn.dataset.dir);
    const min = k === 'cycles' ? 1 : 1;
    const max = k === 'cycles' ? 8 : 60;
    cfg[k] = Math.min(max, Math.max(min, cfg[k] + dir));
    document.getElementById('cfg-'+k).textContent = cfg[k];
  });
});

// ─── Mode tabs ────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    clearInterval(interval);
    running = false;
    switchMode(t.dataset.mode);
    render();
  });
});

// ─── Button events ────────────────────────────────────────
startBtn.addEventListener('click', startStop);
resetBtn.addEventListener('click', reset);
skipBtn.addEventListener('click',  skip);

// ─── Install bar ──────────────────────────────────────────
const isStandalone = window.navigator.standalone === true ||
                     window.matchMedia('(display-mode: standalone)').matches;

if (!isStandalone && !localStorage.getItem('install_dismissed')) {
  setTimeout(() => document.getElementById('installBar').classList.add('show'), 2000);
}

document.getElementById('installOk').addEventListener('click', () => {
  document.getElementById('installBar').classList.remove('show');
  localStorage.setItem('install_dismissed','1');
});
document.getElementById('installDismiss').addEventListener('click', () => {
  document.getElementById('installBar').classList.remove('show');
  localStorage.setItem('install_dismissed','1');
});

// ─── Service Worker registration ─────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// ─── Wake Lock ───────────────────────────────────────────
if ('wakeLock' in navigator) {
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && running) {
      try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  });
}

// ─── Init ─────────────────────────────────────────────────
render();
if (running) {
  interval = setInterval(tick, 500);
  scheduleNotif(); // re-schedule notification in case SW was restarted
}
</script>
