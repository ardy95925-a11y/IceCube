<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ice Cube Gaem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0d1120;
      --border:    rgba(180, 215, 255, 0.12);
      --ice:       #c8dff5;
      --ice-dim:   rgba(200, 223, 245, 0.45);
      --gold:      #c9a96e;
      --text:      #dde8f5;
      --muted:     rgba(180, 210, 240, 0.38);

      --c-common:    #8fb4d4;
      --c-uncommon:  #5fd48a;
      --c-rare:      #5eaaff;
      --c-epic:      #b87fff;
      --c-legendary: #ffcc44;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Subtle ice-noise background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(90,160,240,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(60,120,200,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(24px, 5vh, 56px) clamp(20px, 5vw, 60px) clamp(32px, 6vh, 64px);
      gap: 0;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
    }
    .title {
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.4rem);
      letter-spacing: 0.22em;
      color: var(--ice);
      line-height: 1;
      text-shadow: 0 0 40px rgba(120,180,255,0.25);
    }
    .subtitle {
      margin-top: 6px;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      letter-spacing: 0.35em;
      color: var(--muted);
      font-weight: 300;
      font-style: italic;
    }

    /* ── STAGE ── */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 3vh, 28px);
      width: 100%;
      max-width: 460px;
    }

    .cube-frame {
      position: relative;
      width: clamp(180px, 40vw, 300px);
      height: clamp(180px, 40vw, 300px);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.5s ease;
    }
    .cube-frame::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(140,200,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    /* rarity glow on frame */
    .cube-frame[data-rarity="Common"]    { box-shadow: 0 0 0 1px rgba(143,180,212,0.15); }
    .cube-frame[data-rarity="Uncommon"]  { border-color: rgba(95,212,138,0.35); box-shadow: 0 0 24px rgba(95,212,138,0.15); }
    .cube-frame[data-rarity="Rare"]      { border-color: rgba(94,170,255,0.45); box-shadow: 0 0 30px rgba(94,170,255,0.20); }
    .cube-frame[data-rarity="Epic"]      { border-color: rgba(184,127,255,0.50); box-shadow: 0 0 36px rgba(184,127,255,0.22); }
    .cube-frame[data-rarity="Legendary"] { border-color: rgba(255,204,68,0.60);  box-shadow: 0 0 48px rgba(255,204,68,0.28); }

    .cube-frame.rolling {
      animation: frameShake 0.55s ease;
    }
    @keyframes frameShake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-6px) rotate(-1deg); }
      35%      { transform: translateX(5px)  rotate(1deg); }
      55%      { transform: translateX(-4px) rotate(-0.5deg); }
      75%      { transform: translateX(3px); }
    }

    .cube-img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      display: block;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      image-rendering: pixelated; /* keeps pixel-art crisp if applicable */
    }
    .cube-img.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* placeholder ice crystal shown before first roll */
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    .placeholder.hidden { opacity: 0; pointer-events: none; }
    .crystal {
      width: 60px; height: 60px;
      opacity: 0.18;
    }

    /* spin overlay during roll */
    .roll-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .roll-overlay.active { opacity: 1; }
    .spinner {
      width: 38px; height: 38px;
      border: 2px solid rgba(200,223,245,0.12);
      border-top-color: var(--ice-dim);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RARITY BADGE ── */
    .rarity-badge {
      font-family: 'Cormorant SC', serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.3em;
      font-weight: 400;
      padding: 5px 20px;
      border: 1px solid currentColor;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s 0.2s ease, transform 0.4s 0.2s ease, color 0.3s ease, border-color 0.3s ease;
      text-transform: uppercase;
      min-width: 160px;
      text-align: center;
    }
    .rarity-badge.visible { opacity: 1; transform: translateY(0); }
    .rarity-badge[data-rarity="Common"]    { color: var(--c-common); }
    .rarity-badge[data-rarity="Uncommon"]  { color: var(--c-uncommon); }
    .rarity-badge[data-rarity="Rare"]      { color: var(--c-rare); }
    .rarity-badge[data-rarity="Epic"]      { color: var(--c-epic); }
    .rarity-badge[data-rarity="Legendary"] { color: var(--c-legendary); }

    .cube-name {
      font-size: clamp(0.8rem, 2.2vw, 1rem);
      font-style: italic;
      font-weight: 300;
      color: var(--ice-dim);
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.4s 0.3s ease;
      text-align: center;
    }
    .cube-name.visible { opacity: 1; }

    /* ── BOTTOM ── */
    .bottom {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(16px, 2.5vh, 26px);
    }

    /* stats row */
    .stats {
      display: flex;
      gap: 32px;
      font-size: clamp(0.62rem, 1.6vw, 0.72rem);
      letter-spacing: 0.2em;
      color: var(--muted);
      font-weight: 300;
    }
    .stat span {
      color: var(--ice-dim);
      font-weight: 400;
    }

    /* roll button */
    .roll-btn {
      position: relative;
      width: 100%;
      max-width: 320px;
      padding: clamp(14px, 3vw, 20px) 0;
      background: transparent;
      border: 1px solid var(--ice-dim);
      border-radius: 3px;
      color: var(--ice);
      font-family: 'Cormorant SC', serif;
      font-size: clamp(1rem, 3vw, 1.25rem);
      letter-spacing: 0.4em;
      font-weight: 300;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.15s;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .roll-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(200,223,245,0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .roll-btn:hover::before,
    .roll-btn:focus-visible::before { opacity: 1; }
    .roll-btn:hover,
    .roll-btn:focus-visible {
      border-color: var(--ice);
      background: rgba(200,223,245,0.05);
      outline: none;
    }
    .roll-btn:active {
      transform: scale(0.97);
      background: rgba(200,223,245,0.08);
    }
    .roll-btn:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }

    /* legendary shimmer on button */
    .roll-btn.legendary-flash {
      animation: legendaryPulse 1s ease forwards;
    }
    @keyframes legendaryPulse {
      0%   { border-color: var(--ice-dim); }
      30%  { border-color: var(--c-legendary); box-shadow: 0 0 30px rgba(255,204,68,0.4); }
      100% { border-color: var(--ice-dim); box-shadow: none; }
    }

    /* rarity table */
    .odds-toggle {
      background: none; border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.6rem, 1.5vw, 0.68rem);
      letter-spacing: 0.22em;
      color: var(--muted);
      cursor: pointer;
      font-style: italic;
      padding: 2px 4px;
      transition: color 0.2s;
    }
    .odds-toggle:hover { color: var(--ice-dim); }

    .odds-panel {
      width: 100%;
      max-width: 320px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
      opacity: 0;
    }
    .odds-panel.open { max-height: 200px; opacity: 1; }

    .odds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(0.6rem, 1.5vw, 0.68rem);
      letter-spacing: 0.12em;
    }
    .odds-table td {
      padding: 5px 8px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
    .odds-table td:last-child { text-align: right; color: var(--ice-dim); }
    .odds-table td.dot::before {
      content: '◆';
      margin-right: 8px;
      font-size: 0.55em;
    }
    .odds-table .r-common    { color: var(--c-common); }
    .odds-table .r-uncommon  { color: var(--c-uncommon); }
    .odds-table .r-rare      { color: var(--c-rare); }
    .odds-table .r-epic      { color: var(--c-epic); }
    .odds-table .r-legendary { color: var(--c-legendary); }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1 class="title">Ice Cube Gaem</h1>
    <p class="subtitle">a specimen collection</p>
  </header>

  <div class="stage">
    <div class="cube-frame" id="cubeFrame">
      <div class="placeholder" id="placeholder">
        <!-- Simple SVG ice crystal placeholder -->
        <svg class="crystal" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="30" y1="4"  x2="30" y2="56" stroke="#c8dff5" stroke-width="1.5"/>
          <line x1="4"  y1="30" x2="56" y2="30" stroke="#c8dff5" stroke-width="1.5"/>
          <line x1="10" y1="10" x2="50" y2="50" stroke="#c8dff5" stroke-width="1.5"/>
          <line x1="50" y1="10" x2="10" y2="50" stroke="#c8dff5" stroke-width="1.5"/>
          <circle cx="30" cy="30" r="5" stroke="#c8dff5" stroke-width="1.5"/>
          <circle cx="30" cy="4"  r="2" fill="#c8dff5"/>
          <circle cx="30" cy="56" r="2" fill="#c8dff5"/>
          <circle cx="4"  cy="30" r="2" fill="#c8dff5"/>
          <circle cx="56" cy="30" r="2" fill="#c8dff5"/>
          <circle cx="10" cy="10" r="2" fill="#c8dff5"/>
          <circle cx="50" cy="50" r="2" fill="#c8dff5"/>
          <circle cx="50" cy="10" r="2" fill="#c8dff5"/>
          <circle cx="10" cy="50" r="2" fill="#c8dff5"/>
        </svg>
      </div>
      <div class="roll-overlay" id="rollOverlay"><div class="spinner"></div></div>
      <img class="cube-img" id="cubeImg" src="" alt="Ice Cube" />
    </div>

    <div class="rarity-badge" id="rarityBadge"></div>
    <div class="cube-name"   id="cubeName"></div>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat">ROLLS &nbsp;<span id="rollCount">0</span></div>
      <div class="stat">RAREST &nbsp;<span id="rarestStat">—</span></div>
    </div>

    <button class="roll-btn" id="rollBtn" onclick="roll()">ROLL</button>

    <button class="odds-toggle" onclick="toggleOdds()">view odds ▾</button>
    <div class="odds-panel" id="oddsPanel">
      <table class="odds-table">
        <tr><td class="dot r-common">Common</td>   <td>IceCube.png</td>          <td>70%</td></tr>
        <tr><td class="dot r-uncommon">Uncommon</td><td>IceCubeUncommon.png</td> <td>20%</td></tr>
        <tr><td class="dot r-rare">Rare</td>        <td>IceCubeRare.png</td>     <td>7%</td></tr>
        <tr><td class="dot r-epic">Epic</td>        <td>IceCubeEpic.png</td>     <td>2.5%</td></tr>
        <tr><td class="dot r-legendary">Legendary</td><td>IceCubeLegendary.png</td><td>0.5%</td></tr>
      </table>
    </div>
  </div>

</div>

<script>
  const CUBES = [
    { rarity: "Common",    file: "IceCube.png",          weight: 70   },
    { rarity: "Uncommon",  file: "IceCubeUncommon.png",  weight: 20   },
    { rarity: "Rare",      file: "IceCubeRare.png",      weight: 7    },
    { rarity: "Epic",      file: "IceCubeEpic.png",      weight: 2.5  },
    { rarity: "Legendary", file: "IceCubeLegendary.png", weight: 0.5  },
  ];

  const RARITY_RANK = { Common: 0, Uncommon: 1, Rare: 2, Epic: 3, Legendary: 4 };

  const totalWeight = CUBES.reduce((s, c) => s + c.weight, 0);

  let rollCount  = 0;
  let rarestSeen = -1;
  let rolling    = false;
  let oddsOpen   = false;

  function pickCube() {
    let r = Math.random() * totalWeight;
    for (const c of CUBES) {
      r -= c.weight;
      if (r <= 0) return c;
    }
    return CUBES[0];
  }

  function roll() {
    if (rolling) return;
    rolling = true;

    const btn       = document.getElementById('rollBtn');
    const frame     = document.getElementById('cubeFrame');
    const img       = document.getElementById('cubeImg');
    const badge     = document.getElementById('rarityBadge');
    const nameLbl   = document.getElementById('cubeName');
    const overlay   = document.getElementById('rollOverlay');
    const placeholder = document.getElementById('placeholder');

    btn.disabled = true;

    // hide current result
    img.classList.remove('visible');
    badge.classList.remove('visible');
    nameLbl.classList.remove('visible');
    overlay.classList.add('active');
    frame.classList.add('rolling');

    const delay = 480 + Math.random() * 220;

    setTimeout(() => {
      const cube = pickCube();
      rollCount++;

      // track rarest
      if (RARITY_RANK[cube.rarity] > rarestSeen) {
        rarestSeen = RARITY_RANK[cube.rarity];
        document.getElementById('rarestStat').textContent = cube.rarity;
      }
      document.getElementById('rollCount').textContent = rollCount;

      // load image
      img.src = cube.file;
      img.onload  = () => reveal(cube, frame, img, badge, nameLbl, overlay, btn, placeholder);
      img.onerror = () => reveal(cube, frame, img, badge, nameLbl, overlay, btn, placeholder); // show even if missing
    }, delay);
  }

  function reveal(cube, frame, img, badge, nameLbl, overlay, btn, placeholder) {
    overlay.classList.remove('active');
    frame.classList.remove('rolling');

    placeholder.classList.add('hidden');

    frame.setAttribute('data-rarity', cube.rarity);
    badge.setAttribute('data-rarity', cube.rarity);
    badge.textContent = cube.rarity;

    nameLbl.textContent = cube.file.replace('.png', '').replace(/([A-Z])/g, ' $1').trim();

    img.classList.add('visible');
    badge.classList.add('visible');
    nameLbl.classList.add('visible');

    if (cube.rarity === 'Legendary') {
      btn.classList.add('legendary-flash');
      setTimeout(() => btn.classList.remove('legendary-flash'), 1100);
    }

    btn.disabled = false;
    rolling = false;
  }

  function toggleOdds() {
    oddsOpen = !oddsOpen;
    document.getElementById('oddsPanel').classList.toggle('open', oddsOpen);
  }
</script>
</body>
</html>
